<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Stránka nenalezena</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container h1 {
            font-size: 120px;
            margin: 0;
        }

        .container p {
            font-size: 22px;
            color: #bdbdbd;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #ffffff;
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #dcdcdc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Tahle stránka neexistuje.</p>
        <a href="/" class="btn">Zpět na hlavní stránku</a>
    </div>
</body>
</html>
